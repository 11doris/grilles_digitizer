name: Deploy grilles_displayer to Pages

on:
  push:
    branches: [main]
    paths: [grilles_displayer/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; skip queued runs superseded by a newer push.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: grilles_displayer
      - id: deployment
        uses: actions/deploy-pages@v4
