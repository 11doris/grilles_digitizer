<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grilles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <!-- ===================================================== LIST PANE ===== -->
    <aside id="listPane" aria-label="Tunes">
      <div class="list-head">
        <div class="list-head-top">
          <div class="brand-wrap">
            <button id="listToggle" class="icon-btn" type="button" title="Collapse list" aria-label="Collapse tune list">☰</button>
            <span class="appname">Grilles</span>
          </div>
          <div class="list-head-actions">
            <button id="filtersBtn" class="icon-btn" type="button" title="Filters" aria-label="Filters" aria-haspopup="true">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1.5 2.5h13M3.5 8h9M6 13.5h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" fill="none"/></svg>
              <span id="filterBadge" class="badge" hidden>0</span>
            </button>
          </div>
        </div>
        <input id="search" type="search" placeholder="Search title or composer…" autocomplete="off" spellcheck="false">
        <div id="activePlChip" class="active-pl-chip" hidden>
          <button id="playlistBtn" type="button" title="Active playlist">Playlists</button>
          <button id="playlistClear" type="button" title="Show all tunes" aria-label="Deactivate playlist">clear</button>
        </div>
      </div>
      <nav id="tuneList" aria-label="Tune list"></nav>
    </aside>

    <!-- =================================================== DETAIL PANE ===== -->
    <main id="detailPane">
      <div class="detail-head">
        <div class="dh-side">
          <button id="backBtn" class="icon-btn" type="button" title="Back to list" aria-label="Back to tune list">‹</button>
          <button id="sidebarOpenBtn" class="icon-btn" type="button" title="Show tune list" aria-label="Show tune list">☰</button>
        </div>
        <div id="detailTitle" class="detail-title">
          <span class="dt-title"></span>
          <span class="dt-composer"></span>
        </div>
        <div class="dh-side">
          <button id="settingsBtn" class="icon-btn" type="button" title="Settings" aria-label="Settings" aria-haspopup="true">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.61l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.74 8.87a.5.5 0 0 0 .12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.61l1.92 3.32c.14.24.42.34.68.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.05.24.25.42.5.42h3.84c.25 0 .45-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.26.12.54.02.68-.22l1.92-3.32a.5.5 0 0 0-.12-.61l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>
          </button>
        </div>
      </div>
      <div id="detailTabs" class="detail-tabs" hidden>
        <button id="tabChords" type="button" class="tab">Chords</button>
        <button id="tabMelody" type="button" class="tab">Melody</button>
      </div>
      <div id="tuneView">
        <div id="tunePane"></div>
      </div>
      <div id="detailFooter" hidden>
        <div id="footerChips" class="footer-chips"></div>
        <div class="footer-controls">
          <div class="fc-left">
            <div id="gridZoom">
              <button id="zoomOut" type="button" title="Zoom grid out" aria-label="Zoom grid out">−</button>
              <button id="zoomIn" type="button" title="Zoom grid in" aria-label="Zoom grid in">+</button>
            </div>
          </div>
          <div class="fc-center">
            <span id="footerTranspose" class="footer-transpose"></span>
          </div>
          <div class="fc-right">
            <button id="brushPlay" type="button" title="Play practice rhythm" aria-label="Play practice rhythm" aria-pressed="false">▶</button>
            <button id="brushBtn" type="button" title="Practice rhythm: tempo and pattern" aria-label="Practice rhythm settings" aria-haspopup="true" aria-expanded="false">♩=140</button>
            <span id="footerNav" class="footer-nav">
              <button id="stepPrev" class="step-btn" type="button">‹ Prev</button>
              <button id="stepNext" class="step-btn" type="button">Next ›</button>
            </span>
          </div>
        </div>
      </div>
    </main>

    <!-- ===================================================== SHEETS ======== -->
    <div id="sheetBackdrop" hidden></div>

    <div id="filtersSheet" class="sheet-panel" hidden>
      <div class="sheet-grip"></div>
      <div class="sheet-title">Filters</div>
      <div class="sheet-row">
        <span class="sheet-row-label">Digitized chords only</span>
        <button id="chordFilter" type="button" class="toggle-btn" title="Show only tunes with digitized chords" aria-label="Filter: digitized chords only" aria-pressed="false"><span class="knob"></span></button>
      </div>
      <div class="sheet-field">
        <label class="sheet-field-label" for="startsOnFilter">Starts on</label>
        <select id="startsOnFilter" title="Filter by opening degree" aria-label="Filter by opening degree"></select>
      </div>
      <div class="sheet-field">
        <label class="sheet-field-label" for="keyFilter">Key</label>
        <select id="keyFilter" title="Filter by key" aria-label="Filter by key"></select>
      </div>
      <div class="sheet-field">
        <label class="sheet-field-label" for="formFilter">Form</label>
        <select id="formFilter" title="Filter by form" aria-label="Filter by form"></select>
      </div>
      <div class="sheet-field">
        <label class="sheet-field-label" for="styleFilter">Style</label>
        <select id="styleFilter" title="Filter by style" aria-label="Filter by style"></select>
      </div>
      <div class="sheet-field">
        <label class="sheet-field-label" for="yearFilter">Year</label>
        <select id="yearFilter" title="Filter by decade" aria-label="Filter by decade"></select>
      </div>
      <div class="sheet-field">
        <button id="tagFilterBtn" type="button" title="Filter by harmonic tags" aria-label="Filter by harmonic tags" aria-haspopup="true" aria-expanded="false" hidden>Tags</button>
      </div>
    </div>

    <div id="settingsSheet" class="sheet-panel" hidden>
      <div class="sheet-grip"></div>
      <div class="sheet-title">Settings</div>

      <!-- Options for the current tune (filled by renderTuneOptions). -->
      <div id="tuneOptions"></div>

      <div class="sheet-divider"></div>

      <div class="sheet-field">
        <div class="sheet-field-label">Appearance</div>
        <div class="seg-group" id="themeSeg">
          <button type="button" class="seg-btn" data-theme-choice="dark">Dark</button>
          <button type="button" class="seg-btn" data-theme-choice="light">Light</button>
          <button type="button" class="seg-btn" data-theme-choice="system">System</button>
        </div>
      </div>
      <div class="sheet-row">
        <span class="sheet-row-label">Section shading</span>
        <button id="tintToggle" type="button" class="toggle-btn" title="Toggle section shading" aria-label="Toggle section shading" aria-pressed="true"><span class="knob"></span></button>
      </div>
      <div class="sheet-row">
        <span class="sheet-row-label">Show verses</span>
        <button id="versesToggle" type="button" class="toggle-btn" title="Show verse sections in the grid" aria-label="Toggle verse sections" aria-pressed="true"><span class="knob"></span></button>
      </div>
      <div class="sheet-field">
        <div class="sheet-field-label">Playlists</div>
        <button id="managePlBtn" type="button" class="sheet-action">Manage playlists…</button>
      </div>
    </div>
  </div>

  <!-- ================================================== OVERLAYS / MENUS === -->
  <div id="scanOverlay" hidden>
    <button id="overlayClose" type="button" aria-label="Close scan">✕</button>
    <img id="overlayImg" alt="">
  </div>
  <div id="playlistMenu" hidden></div>
  <div id="tagFilterMenu" hidden></div>
  <div id="brushMenu" hidden></div>
  <div id="plPopover" hidden></div>
  <input id="plImportFile" type="file" accept=".json,application/json" hidden>

  <script src="data/tunes_data.js"></script>
  <script src="data/similar_data.js"></script>
  <script src="vendor/abcjs-basic-min.js"></script>
  <script src="chords.js"></script>
  <script src="playlists.js"></script>
  <script src="app.js"></script>
  <script src="brushes.js"></script>
</body>
</html>
