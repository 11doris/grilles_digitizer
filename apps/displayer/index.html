<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grilles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <button id="listToggle" type="button" title="Show tune list" aria-label="Toggle tune list">☰</button>
    <span class="appname">Grilles</span>
    <input id="search" type="search" placeholder="Search title or composer…" autocomplete="off" spellcheck="false">
    <button id="chordFilter" type="button" title="Show only tunes with digitized chords" aria-label="Filter: digitized chords only" aria-pressed="false">▦</button>
    <select id="startsOnFilter" title="Filter by opening degree" aria-label="Filter by opening degree"></select>
    <select id="keyFilter" title="Filter by key" aria-label="Filter by key"></select>
    <select id="formFilter" title="Filter by form" aria-label="Filter by form"></select>
    <button id="tagFilterBtn" type="button" title="Filter by harmonic tags" aria-label="Filter by harmonic tags" aria-haspopup="true" aria-expanded="false" hidden>Tags</button>
    <button id="playlistBtn" type="button" title="Playlists">Playlists</button>
    <button id="playlistClear" type="button" title="Show all tunes" aria-label="Deactivate playlist" hidden>✕</button>
    <button id="brushPlay" type="button" title="Play practice rhythm" aria-label="Play practice rhythm" aria-pressed="false">▶</button>
    <button id="brushBtn" type="button" title="Practice rhythm: tempo and pattern" aria-label="Practice rhythm settings" aria-haspopup="true" aria-expanded="false">♩=140</button>
    <button id="tintToggle" type="button" title="Toggle section shading" aria-label="Toggle section shading" aria-pressed="true"><svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5c2.8 3.4 4.6 5.9 4.6 8.2A4.6 4.6 0 0 1 8 14.3a4.6 4.6 0 0 1-4.6-4.6C3.4 7.4 5.2 4.9 8 1.5z"/></svg></button>
    <button id="themeToggle" type="button" title="Toggle theme">☀</button>
  </header>
  <div class="layout">
    <nav id="tuneList" aria-label="Tunes"></nav>
    <div id="listBackdrop"></div>
    <main id="tuneView">
      <button id="addPlBtn" type="button" title="Add current tune to playlist" aria-label="Add current tune to playlist">＋</button>
      <div id="tunePane"></div>
    </main>
  </div>
  <div id="scanOverlay" hidden>
    <button id="overlayClose" type="button" aria-label="Close scan">✕</button>
    <img id="overlayImg" alt="">
  </div>
  <div id="gridZoom">
    <button id="zoomOut" type="button" title="Zoom grid out" aria-label="Zoom grid out">−</button>
    <button id="zoomIn" type="button" title="Zoom grid in" aria-label="Zoom grid in">+</button>
  </div>
  <div id="playlistMenu" hidden></div>
  <div id="tagFilterMenu" hidden></div>
  <div id="brushMenu" hidden></div>
  <div id="plPopover" hidden></div>
  <input id="plImportFile" type="file" accept=".json,application/json" hidden>
  <script src="data/tunes_data.js"></script>
  <script src="data/similar_data.js"></script>
  <script src="vendor/abcjs-basic-min.js"></script>
  <script src="chords.js"></script>
  <script src="playlists.js"></script>
  <script src="app.js"></script>
  <script src="brushes.js"></script>
</body>
</html>
