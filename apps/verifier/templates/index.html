<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tune Verifier</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<div id="app">

  <!-- ═══ Sidebar ══════════════════════════════════════════════════════ -->
  <aside id="sidebar">
    <div id="sidebar-top">
      <div id="app-name">🎵 Tune Verifier</div>
      <div id="progress-wrap">
        <div id="progress-text">Loading…</div>
        <div id="progress-track"><div id="progress-fill"></div></div>
      </div>
    </div>
    <nav id="filter-tabs" class="sb-tabs">
      <button data-filter="needs_review" class="active">needs review</button>
      <button data-filter="variant_review" title="Chords already verified — only the auto-computed variant targets need a glance">variants</button>
      <button data-filter="deferred">deferred</button>
      <button data-filter="all">all</button>
    </nav>
    <ul id="tune-list"></ul>
  </aside>

  <!-- ═══ Main ═════════════════════════════════════════════════════════ -->
  <div id="main">

    <div id="no-tune">← Select a tune from the sidebar</div>

    <div id="editor-wrap" class="hidden">

      <!-- Header -->
      <div id="editor-header">
        <h1 id="editor-title"></h1>
        <div id="editor-btns">
          <span id="dirty-dot" class="hidden" title="Unsaved changes">●</span>
          <button id="btn-save" class="btn btn-primary">Save  <kbd>Ctrl+S</kbd></button>
          <button id="btn-defer" class="btn btn-outline" title="Park this tune for a later review pass">⏸ Defer</button>
          <button id="btn-resume" class="btn btn-outline hidden" title="Return this tune to the review queue">▶ Resume</button>
          <button id="btn-verify" class="btn btn-success">✓ Mark Verified</button>
          <button id="btn-unverify" class="btn btn-danger hidden">↩ Unverify</button>
        </div>
      </div>

      <!-- Variant-review banner (shown only for variant_review tunes) -->
      <div id="variant-banner" class="hidden">
        <span class="vb-icon">◆</span>
        <span class="vb-text">Chords already verified. The variant <strong>targets</strong> below were auto-computed — check them, then <strong>Mark Verified</strong> to clear this flag.</span>
        <button id="vb-goto" class="btn btn-xs btn-outline" type="button">Jump to variants ↓</button>
      </div>

      <!-- Body: editor + optional image panel -->
      <div id="editor-body">
        <div id="editor-scroll">

          <!-- Meta fields -->
          <details id="meta-details" open>
            <summary><span>Metadata</span></summary>
            <div id="meta-grid"></div>
            <div id="extra-fields"></div>
            <div id="add-field-row">
              <button id="btn-add-field" class="btn btn-sm btn-outline">+ Add field</button>
            </div>
          </details>

          <!-- Sections -->
          <div id="sections-area">
            <div id="sections-container"></div>
            <button id="btn-add-section" class="btn btn-sm btn-outline">+ Add Section</button>
          </div>

          <!-- Variants -->
          <div id="variants-area">
            <div class="area-label">Variants</div>
            <div id="variants-container"></div>
            <button id="btn-add-variant" class="btn btn-sm btn-outline">+ Add Variant</button>
          </div>

        </div><!-- /editor-scroll -->

        <!-- Image panel -->
        <div id="image-panel" class="hidden">
          <div id="image-sticky">
            <div class="image-label">Scan  <button id="btn-zoom" class="btn btn-xs btn-outline">⤢ Zoom</button></div>
            <div id="crop-filename" class="crop-filename"></div>
            <img id="crop-img" src="" alt="Crop scan" />
          </div>
        </div>

      </div><!-- /editor-body -->
    </div><!-- /editor-wrap -->

  </div><!-- /main -->
</div><!-- /app -->

<!-- Zoom overlay -->
<div id="zoom-overlay" class="hidden" role="dialog" aria-modal="true">
  <button id="zoom-close" title="Close (Esc)">✕</button>
  <div id="zoom-scroll">
    <img id="zoom-img" src="" alt="Crop (full size)" />
  </div>
</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<script src="/static/app.js"></script>
</body>
</html>
